openapi: 3.1.0
info:
  title: Brew Privacy & Consent API (DPDP Act, 2023)
  version: 1.0.0
  description: Consent ledger, Data Subject Requests (access/correction/erasure/portability), retention policies.
servers: [{ url: http://localhost:3000/v1 }]
security: [{ cognito: [] }]
paths:
  /privacy/consents:
    get:
      operationId: getConsents
      summary: Current consent state per purpose for the calling customer
      responses: { '200': { description: Consent records } }
    post:
      operationId: setConsent
      summary: Grant/withdraw consent for a purpose (versioned, timestamped)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [purpose, granted]
              properties:
                purpose: { type: string, enum: [TRANSACTIONAL, MARKETING, ANALYTICS] }
                granted: { type: boolean }
      responses: { '200': { description: Recorded } }
  /privacy/dsr:
    post:
      operationId: createDsr
      summary: Raise a Data Subject Request (SLA-tracked)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type: { type: string, enum: [ACCESS, CORRECTION, ERASURE, PORTABILITY] }
      responses: { '201': { description: DSR created } }
  /privacy/export:
    get:
      operationId: exportMyData
      summary: Data portability — download the customer's data
      responses: { '200': { description: Data export bundle } }
components:
  securitySchemes:
    cognito: { type: http, scheme: bearer, bearerFormat: JWT }
