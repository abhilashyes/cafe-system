name: Deploy PWA (GitHub Pages)

# Publishes the Flutter web/PWA build to GitHub Pages on every push to main.
# Live URL: https://<owner>.github.io/<repo>/
#
# One-time setup: repo Settings → Pages → Build and deployment → Source = "GitHub Actions".
# Optional: set a repo Variable BREW_API to your public backend URL (Settings →
# Secrets and variables → Actions → Variables). Without it the UI loads but API
# calls go to the placeholder host.

on:
  push:
    branches: [main]
    paths: ["apps/brew-mobile-customer/**", ".github/workflows/deploy-pwa-pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/brew-mobile-customer
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter create . --org com.projectbrew --project-name brew_mobile_customer --platforms=web
      - run: flutter pub get

      # Pages serves under /<repo>/, so the base href must match.
      - name: Build web (PWA)
        run: |
          flutter build web --release \
            --base-href "/${GITHUB_REPOSITORY#*/}/" \
            --dart-define=BREW_API=${{ vars.BREW_API || 'https://api.brew.example' }}

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/brew-mobile-customer/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
