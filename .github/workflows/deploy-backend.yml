name: Deploy backend

# Build the backend image and roll it out to ECS Fargate using the GitHub OIDC
# deploy role created by brew-infra (cicd module). No static AWS keys.

on:
  push:
    branches: [main]
    paths:
      - "apps/brew-backend/**"
      - "packages/brew-contracts/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

permissions:
  id-token: write # required for OIDC
  contents: read

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: brew-dev-backend
  ECS_CLUSTER: brew-dev
  ECS_SERVICE: brew-dev-backend
  TASK_FAMILY: brew-dev-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.login.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY:${GITHUB_SHA::12}"
          docker build -f apps/brew-backend/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Register new task definition revision
        run: |
          CURRENT=$(aws ecs describe-task-definition --task-definition "$TASK_FAMILY" --query taskDefinition)
          NEW=$(echo "$CURRENT" | jq --arg IMG "$IMAGE" '
            .containerDefinitions[0].image = $IMG
            | {
                family,
                taskRoleArn,
                executionRoleArn,
                networkMode,
                containerDefinitions,
                requiresCompatibilities,
                cpu,
                memory
              }
            | with_entries(select(.value != null))')
          echo "$NEW" > taskdef.json
          aws ecs register-task-definition --cli-input-json file://taskdef.json

      - name: Update service (rolling deploy)
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "$TASK_FAMILY" \
            --force-new-deployment

      - name: Wait for stable
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"
