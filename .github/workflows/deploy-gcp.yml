name: Deploy backend (GCP Cloud Run)

# Automated CD via Workload Identity Federation (keyless — no service-account JSON
# in GitHub). The image is built on the GitHub runner (Docker preinstalled) and
# pushed to Artifact Registry, then deployed to Cloud Run — everything runs as the
# deployer service account, so no Cloud Build staging bucket or extra SAs are
# involved. Setup of the WIF pool/provider + service account + the three repo
# variables is described in docs/DEPLOY-GCP.md (§7). The job is a no-op until
# GCP_PROJECT_ID is set.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/brew-backend/**"
      - "packages/brew-contracts/**"
      - ".github/workflows/deploy-gcp.yml"

permissions:
  id-token: write # required for Workload Identity Federation
  contents: read

env:
  GCP_REGION: asia-south1
  AR_REPO: brew
  SERVICE: brew-backend
  PROFILE: demo

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip unless the project is configured (avoids failing on forks/unconfigured repos).
    if: ${{ vars.GCP_PROJECT_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF, keyless)
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build & push image (on the runner)
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${AR_REPO}/${SERVICE}:${GITHUB_SHA::12}"
          docker build -f apps/brew-backend/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --image="$IMAGE" \
            --region="$GCP_REGION" \
            --platform=managed \
            --port=3000 \
            --allow-unauthenticated \
            --set-env-vars=BREW_PROFILE=${PROFILE} \
            --cpu=1 --memory=512Mi \
            --min-instances=0 --max-instances=2

      - name: Show service URL
        run: |
          gcloud run services describe "$SERVICE" --region "$GCP_REGION" \
            --format='value(status.url)'
